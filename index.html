<!DOCTYPE html>
<html>
<head>
  <title>Miani AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0d1117;
      color: white;
    }

    #chatbox {
      width: 90%;
      max-width: 400px;
      margin: auto;
      margin-top: 20px;
      text-align: left;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
    }

    .user {
      background: #238636;
    }

    .bot {
      background: #30363d;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>🤖 Miani AI</h1>

<div id="chatbox"></div>

<input id="input" placeholder="Type message...">
<button onclick="reply()">Send</button>

<script>
function reply() {
  let input = document.getElementById("input").value;

  if (input === "") return;

  let chatbox = document.getElementById("chatbox");

  chatbox.innerHTML += `<div class='msg user'>${input}</div>`;

  let response = getReply(input);

  chatbox.innerHTML += `<div class='msg bot'>${response}</div>`;

  document.getElementById("input").value = "";
}

function getReply(input) {
  input = input.toLowerCase();

  if (input.includes("hello")) return "Hi 👋";
  if (input.includes("name")) return "I am Miani AI 🤖";
  if (input.includes("how are you")) return "I'm good 😄";

  return "I don't understand yet 😅";
}
</script>

</body>
</html>

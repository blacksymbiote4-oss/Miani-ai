<script>
async function reply() {
  let input = document.getElementById("input").value;
  if (input === "") return;

  let chatbox = document.getElementById("chatbox");

  chatbox.innerHTML += `<div class='msg user'>${input}</div>`;

  document.getElementById("input").value = "";

  let response = await getAIReply(input);

  chatbox.innerHTML += `<div class='msg bot'>${response}</div>`;
}

async function getAIReply(input) {
  const apiKey = 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

  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + apiKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: model: "openai/gpt-4o-mini"
      messages: [
        { role: "user", content: input }
      ]
    })
  });

  const data = await response.json();
  return data.choices[0].message.content;
}
</script>

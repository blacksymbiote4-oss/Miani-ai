<!DOCTYPE html>
<html>
<head>
  <title>Miani AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0d1117;
      color: white;
    }

    #chatbox {
      width: 90%;
      max-width: 400px;
      margin: auto;
      margin-top: 20px;
      text-align: left;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
    }

    .user { background: #238636; }
    .bot { background: #30363d; }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>🤖 Miani AI</h1>

<div id="chatbox"></div>

<input id="input" placeholder="Type message...">
<button onclick="reply()">Send</button>

<script>
async function reply() {
  let input = document.getElementById("input").value;
  if (input === "") return;

  let chatbox = document.getElementById("chatbox");
  chatbox.innerHTML += `<div class='msg user'>${input}</div>`;
  document.getElementById("input").value = "";

  let response = await getAIReply(input);
  chatbox.innerHTML += `<div class='msg bot'>${response}</div>`;
}

async function getAIReply(input) {
  const apiKey = 

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-4o-mini",
        messages: [{ role: "user", content: input }]
      })
    });

    const data = await response.json();
    return data.choices?.[0]?.message?.content || "No reply 😅";
  } catch (e) {
    return "Error aa gaya 😢";
  }
}
</script>

</body>
</html>
